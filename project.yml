name: ThrottleartInvoiceApp

options:
  bundleIdPrefix: com.throttleart
  deploymentTarget:
    iOS: "17.0"

targets:
  ThrottleartInvoiceApp:
    type: application
    platform: iOS
    sources:
      - path: ThrottleartInvoiceApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.throttleart.invoiceapp
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Select a signature image for invoice PDF generation.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
