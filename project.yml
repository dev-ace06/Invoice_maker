name: ThrottleartInvoiceApp

options:
  bundleIdPrefix: com.throttleart
  deploymentTarget:
    iOS: "17.0"

targets:
  ThrottleartInvoiceApp:
    type: application
    platform: iOS
    sources:
      - path: ThrottleartInvoiceApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.throttleart.invoiceapp
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Config/Info.plist
